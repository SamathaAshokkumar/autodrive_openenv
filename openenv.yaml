spec_version: 1
name: autodrive_env
type: space
runtime: fastapi
app: autodrive_env.server.app:app
port: 8000
description: "AutoDrive Gym for autonomous driving in Indian road conditions."
tags:
  - openenv
  - driving
  - autonomous-vehicles

tasks:
  - id: pedestrian_crossing
    difficulty: easy
    description: "Pedestrian or vulnerable road user crosses suddenly — agent must brake safely"
    ideal_action: brake
    steps: 5

  - id: auto_cut_in
    difficulty: easy
    description: "Auto-rickshaw cuts into the lane unpredictably — agent must slow and yield"
    ideal_action: brake
    steps: 5

  - id: bike_blind_spot
    difficulty: medium
    description: "Bike merges from blind spot — agent must wait or brake defensively"
    ideal_action: wait
    steps: 5

scoring:
  reward_range: [0.02, 0.98]
  success_threshold: 0.5
  score_formula: mean(step_rewards)
