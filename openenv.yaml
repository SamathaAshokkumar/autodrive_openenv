spec_version: 1
name: autodrive_env
type: space
runtime: fastapi
app: autodrive_env.server.app:app
port: 8000
description: "AutoDrive Gym for autonomous driving in Indian road conditions."
tags:
  - openenv
  - driving
  - autonomous-vehicles
tasks:
  - id: pedestrian_crossing
    difficulty: easy
    description: "Vulnerable road user crosses suddenly in Indian traffic"
    grader: "autodrive_env.server.grader:HeuristicGrader"
  - id: auto_cut_in
    difficulty: easy
    description: "Auto-rickshaw cuts in unpredictably from the left"
    grader: "autodrive_env.server.grader:HeuristicGrader"
  - id: bike_blind_spot
    difficulty: medium
    description: "Bike merges from blind spot requiring defensive braking"
    grader: "autodrive_env.server.grader:HeuristicGrader"
