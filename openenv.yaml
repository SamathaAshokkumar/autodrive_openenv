spec_version: 1
name: autodrive_env
type: space
runtime: fastapi
app: autodrive_env.server.app:app
port: 8000
description: "AutoDrive Gym for autonomous driving in Indian road conditions."
tags:
  - openenv
  - driving
  - autonomous-vehicles
tasks:
  - id: pedestrian_crossing
    difficulty: easy
    description: "Vulnerable road user crosses suddenly"
    grader: "autodrive_env.server.judge:HeuristicGrader"
  - id: auto_cut_in
    difficulty: easy
    description: "Auto-rickshaw cuts in unpredictably"
    grader: "autodrive_env.server.judge:HeuristicGrader"
  - id: bike_blind_spot
    difficulty: medium
    description: "Bike merges from blind spot"
    grader: "autodrive_env.server.judge:HeuristicGrader"
  - id: pothole_ahead
    difficulty: medium
    description: "Road surface hazard requires smooth avoidance"
    grader: "autodrive_env.server.judge:HeuristicGrader"
  - id: traffic_light_ambiguity
    difficulty: medium
    description: "Conflicting signals require cautious response"
    grader: "autodrive_env.server.judge:HeuristicGrader"
  - id: adversarial
    difficulty: hard
    description: "Multiple unpredictable agents in chaotic Indian traffic"
    grader: "autodrive_env.server.judge:HeuristicGrader"
